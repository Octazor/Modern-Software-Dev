<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project Task Tracker{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        .flash-messages {
            margin-bottom: 1rem;
        }
        .flash-message {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .flash-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .flash-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .task-card {
            background: var(--card-background-color);
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--card-border-color);
        }
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .task-title {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }
        .task-status {
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }
        .status-in-progress {
            background-color: #cce5ff;
            color: #004085;
        }
        .status-completed {
            background-color: #d4edda;
            color: #155724;
        }
        .task-description {
            color: var(--muted-color);
            margin-bottom: 1rem;
        }
        .task-actions {
            display: flex;
            gap: 0.5rem;
        }
        .task-actions a,
        .task-actions button {
            margin: 0;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }
        .delete-form {
            display: inline;
            margin: 0;
        }
        .delete-button {
            background-color: #dc3545;
            border-color: #dc3545;
        }
        .delete-button:hover {
            background-color: #c82333;
            border-color: #bd2130;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--muted-color);
        }
        .empty-state h3 {
            margin-bottom: 0.5rem;
        }
        header {
            margin-bottom: 2rem;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav h1 {
            margin: 0;
        }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <nav>
                <h1><a href="/" style="text-decoration: none; color: inherit;">📋 Task Tracker</a></h1>
                {% block nav_actions %}{% endblock %}
            </nav>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash-message flash-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
