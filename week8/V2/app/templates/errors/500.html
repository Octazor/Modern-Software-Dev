{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-code text-mono">500</div>
  <h1>Something went wrong</h1>
  <p>An unexpected server error occurred. Please try again later.</p>
  <a href="{{ url_for('tasks.index') }}" class="btn btn-primary mt-16">← Back to Dashboard</a>
</div>
<style>
  .error-page { text-align: center; padding: 80px 24px; }
  .error-code { font-size: 5rem; font-weight: 300; color: var(--border-dark); line-height: 1; margin-bottom: 16px; }
  .error-page h1 { font-family: var(--font-display); font-size: 1.75rem; margin-bottom: 10px; }
  .error-page p { color: var(--ink-soft); font-size: 0.95rem; }
</style>
{% endblock %}
